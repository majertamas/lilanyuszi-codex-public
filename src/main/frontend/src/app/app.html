<div class="flex p-4 items-center justify-center">
  @if (userService.isLoggedIn()) {
    <p-button label="Logout" (click)="logout()" (keydown.enter)="logout()"/>
  }
  <p-button label="Me" (click)="me()" (keydown.enter)="me()" class="ml-4"/>
  <p-button label="Lists" (click)="lists()" (keydown.enter)="lists()" class="ml-4"/>
  <p-button label="Shopping Lists" (click)="shoppingLists()" (keydown.enter)="shoppingLists()" class="ml-4"/>
  <p-button label="MessageTest" (click)="messageTest()" (keydown.enter)="messageTest()" class="ml-4"/>
  <app-m-button
    [icon]="this.darkModeService.isDarkMode() ? 'light_mode' : 'dark_mode'"
    (onClick)="toggleDarkMode()"
    size="small"
    [styleClass]="'bg-transparent border-0'" severity="contrast"
    [iconStyleClass]="this.darkModeService.isDarkMode() ? 'text-white' : 'text-black'"
    class="ml-4"
  />
</div>

<p-toast>
  <ng-template let-message #message>
    <div class="flex flex-col gap-4 w-full">
      <div class="flex items-center gap-4">
      <span class="material-icons">
        {{ getIconBySeverity(message.severity) }}
      </span>
        <span class="font-black uppercase text-2xl">
        {{ message.summary }}
      </span>
      </div>
      <div class="font-black" [ngClass]="getTextColorBySeverity(message.severity)">
        {{ message.detail }}
      </div>
    </div>
  </ng-template>
</p-toast>

<p-block-ui [blocked]="blockUiService.blocked()">
  <ng-template #content>
    <div class="w-full">
      <div class="flex justify-center items-end h-1/2">
        <i class="pi pi-spin pi-spinner text-5xl"></i>
      </div>
    </div>
  </ng-template>
</p-block-ui>

<router-outlet/>
